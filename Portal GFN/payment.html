<style>

	.portal-checkout-clone .card-header {

		background-color: #F7A200;
	}

	.portal-checkout-clone .checkcontainer input:checked~.radioSupport:after {
		display: none;
	}

	.portal-checkout-clone .full-width.img-bg {
		width: 100%;
		display: flex;
		align-items: center;
		background: #efefef;
		padding: 4px;
		border-radius: 5px;

	.portal-checkout-clone .checkcontainer:hover input~.radioSupport {

	.portal-checkout-clone .checkcontainer {
		display: flex;
		flex-direction: column;
		align-items: center;
	}

	.portal-checkout-clone .checkcontainer img {

	.portal-checkout-clone .checkcontainer span.label {
		font-size: 16px;
		color: #333;
		font-weight: bold;
	}

	.portal-checkout-clone .card-header.active {
		background-color: #686868;
		/* Highlight active section */
	}

	.portal-checkout-clone .card-header.collapsed {
		background-color: #F7A200;
		/* Default color for collapsed */
	}
</style>

<script>
	document.querySelectorAll('.card-header').forEach(header => {
		header.addEventListener('click', function() {
			document.querySelectorAll('.card-header').forEach(h => h.classList.add('collapsed'));
			this.classList.remove('collapsed');
			this.classList.add('active');
		});
	});
</script>
